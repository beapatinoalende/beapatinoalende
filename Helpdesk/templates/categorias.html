{% extends 'base.html' %}
{% block content %}

<h3 class="mb-4">Categorías de tickets</h3>

<div class="row g-4">
  <div class="col-md-5">
    <div class="card card-soft p-4">
      <h5 class="mb-3">Nueva categoría</h5>
      <form method="post">
        <input type="text" name="nombre" class="form-control mb-2" placeholder="Nombre de categoría" required>
        <button class="btn btn-helpdesk w-100">Añadir</button>
      </form>
    </div>
  </div>
  <div class="col-md-7">
    <div class="card card-soft p-0">
      <table class="table mb-0">
        <thead class="table-light"><tr><th>ID</th><th>Nombre</th></tr></thead>
        <tbody>
          {% for c in categorias %}
          <tr><td>{{ c.id }}</td><td>{{ c.nombre }}</td></tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
</div>

<a href="{{ url_for('index') }}" class="btn btn-outline-secondary mt-3">Volver</a>

{% endblock %}
