{% extends 'base.html' %}
{% block title %}Recuperar contraseña · Helpdesk{% endblock %}
{% block content %}
<div class="row justify-content-center auth-panel">
  <div class="col-md-6 col-lg-5">
    <div class="card card-soft p-4">
      <h4 class="mb-3 text-center">Recuperar contraseña</h4>
      <p class="text-muted small">Introduce el correo de tu cuenta. Te enviaremos un enlace para elegir una contraseña nueva.</p>

      <form method="POST">
        <div class="mb-3">
          <label class="form-label">Correo electrónico</label>
          <input type="email" name="email" required class="form-control" autocomplete="email">
        </div>
        <button class="btn btn-helpdesk w-100">Enviar enlace</button>
      </form>

      <p class="mt-3 text-center mb-0">
        <a href="{{ url_for('login') }}">Volver al inicio de sesión</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
