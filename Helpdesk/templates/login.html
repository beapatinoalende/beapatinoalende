{% extends 'base.html' %}
{% block title %}Iniciar sesión · Helpdesk{% endblock %}
{% block content %}
<div class="row justify-content-center auth-panel">
  <div class="col-md-5 col-lg-4">
    <div class="text-center mb-4">
      <h2 class="fw-bold mb-1">Helpdesk</h2>
      <p class="text-muted mt-2 mb-0">Acceso al sistema de soporte</p>
    </div>
    <div class="card card-soft p-4">
      <h4 class="mb-3 text-center">Iniciar sesión</h4>

      <form method="post" action="{{ url_for('login') }}">
        <div class="mb-3">
          <label class="form-label">Correo electrónico</label>
          <input type="email" name="email" class="form-control" required autocomplete="email">
        </div>

        <div class="mb-3">
          <label class="form-label">Contraseña</label>
          <input type="password" name="password" class="form-control" required autocomplete="current-password">
        </div>

        <button class="btn btn-helpdesk w-100">Entrar</button>
      </form>

      <p class="mt-3 text-center mb-0">
        ¿No tienes cuenta?
        <a href="{{ url_for('register') }}">Registrarse</a>
      </p>
      <div class="text-center mt-3">
      <a href="{{ url_for('olvide_contrasena') }}">¿Olvidaste tu contraseña?</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
