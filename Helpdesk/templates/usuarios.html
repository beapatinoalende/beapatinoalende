{% extends 'base.html' %}
{% block content %}

<h3 class="mb-4">Gestión de usuarios</h3>

<form method="get" class="mb-3">
  <div class="row g-2">
    <div class="col-md-6">
      <input type="text" name="q" class="form-control" placeholder="Buscar por nombre o email"
             value="{{ buscar }}">
    </div>
    <div class="col-md-2">
      <button class="btn btn-helpdesk w-100">Buscar</button>
    </div>
    <div class="col-md-2">
      <a href="{{ url_for('listar_usuarios') }}" class="btn btn-outline-secondary w-100">Limpiar</a>
    </div>
  </div>
</form>

<div class="table-responsive">
  <table class="table table-striped table-bordered align-middle usuarios-table">
    <thead class="table-light">
      <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Email</th>
        <th>Rol</th>
        <th class="acciones-col">Acciones</th>
      </tr>
    </thead>
    <tbody>
      {% for u in usuarios %}
      <tr>
        <td>{{ u.id }}</td>
        <td>{{ u.nombre }}</td>
        <td>{{ u.email }}</td>
        <td>{{ u.rol }}</td>
        <td class="acciones-col">
          <a href="{{ url_for('editar_usuario', id=u.id) }}" class="btn btn-sm btn-helpdesk">Editar</a>
          <form method="post" action="{{ url_for('eliminar_usuario', id=u.id) }}" class="d-inline"
                onsubmit="return confirm('¿Seguro que quieres eliminar este usuario? Esta acción no se puede deshacer.');">
            <button type="submit" class="btn btn-sm btn-outline-danger">Eliminar</button>
          </form>
        </td>
      </tr>
      {% else %}
      <tr>
        <td colspan="5" class="text-center text-muted">No hay usuarios con ese criterio.</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>

{% endblock %}
