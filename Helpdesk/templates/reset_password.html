{% extends 'base.html' %}
{% block title %}Nueva contraseña · Helpdesk{% endblock %}
{% block content %}
<div class="row justify-content-center auth-panel">
  <div class="col-md-6 col-lg-5">
    <div class="card card-soft p-4">
      <h4 class="mb-3 text-center">Nueva contraseña</h4>
      <p class="text-muted small">Elige una contraseña nueva para tu cuenta.</p>

      <form method="POST">
        <div class="mb-3">
          <label class="form-label">Nueva contraseña</label>
          <input type="password" name="password" required class="form-control" minlength="6" autocomplete="new-password">
        </div>
        <div class="mb-3">
          <label class="form-label">Repetir contraseña</label>
          <input type="password" name="password_confirm" required class="form-control" minlength="6" autocomplete="new-password">
        </div>
        <button class="btn btn-helpdesk w-100">Guardar contraseña</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
