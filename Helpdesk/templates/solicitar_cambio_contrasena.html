{% extends 'base.html' %}
{% block title %}Cambiar contraseña · Helpdesk{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-8 col-lg-6">
    <div class="card card-soft p-4">
      <h4 class="mb-3">Cambiar contraseña</h4>
      <p class="text-muted">
        Por seguridad, te enviaremos un enlace a tu correo registrado
        {% if email %}(<strong>{{ email }}</strong>){% endif %} para elegir la nueva contraseña.
      </p>

      <form method="POST">
        <button class="btn btn-helpdesk">Enviar enlace a mi correo</button>
        <a href="{{ url_for('index') }}" class="btn btn-outline-secondary">Cancelar</a>
      </form>
    </div>
  </div>
</div>
{% endblock %}
