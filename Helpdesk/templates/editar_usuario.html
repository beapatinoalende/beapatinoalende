{% extends 'base.html' %}
{% block content %}

<div class="card card-soft p-4">
  <h4 class="mb-3">Editar usuario #{{ usuario.id }}</h4>

  <form method="post">
    <div class="mb-3">
      <label class="form-label">Nombre</label>
      <input type="text" name="nombre" class="form-control" value="{{ usuario.nombre }}" required>
    </div>

    <div class="mb-3">
      <label class="form-label">Correo</label>
      <input type="email" name="email" class="form-control" value="{{ usuario.email }}" required>
    </div>

    <div class="mb-3">
      <label class="form-label">Rol</label>
      <select name="rol" class="form-select">
        <option value="cliente" {% if usuario.rol == 'cliente' %}selected{% endif %}>Cliente</option>
        <option value="agente" {% if usuario.rol == 'agente' %}selected{% endif %}>Agente</option>
        <option value="admin" {% if usuario.rol == 'admin' %}selected{% endif %}>Administrador</option>
      </select>
    </div>

    <div class="mb-3">
      <label class="form-label">Nueva contraseña (opcional)</label>
      <input type="password" name="password" class="form-control" placeholder="Dejar vacío para no cambiar">
    </div>

    <button class="btn btn-helpdesk">Guardar cambios</button>
    <a href="{{ url_for('listar_usuarios') }}" class="btn btn-outline-secondary">Volver</a>
    {% if usuario.id != session.get('usuario_id') %}
    <button type="submit" form="form-eliminar-usuario" class="btn btn-outline-danger"
            onclick="return confirm('¿Seguro que quieres eliminar este usuario? Esta acción no se puede deshacer.');">
      Eliminar
    </button>
    {% endif %}
  </form>

  {% if usuario.id != session.get('usuario_id') %}
  <form id="form-eliminar-usuario" method="post" action="{{ url_for('eliminar_usuario', id=usuario.id) }}"></form>
  {% endif %}
</div>

{% endblock %}
