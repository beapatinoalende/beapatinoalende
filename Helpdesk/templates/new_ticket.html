{% extends 'base.html' %}
{% block content %}
<div class="card card-soft p-4">
  <h4 class="mb-3">Nueva petición</h4>
  <form method="post" enctype="multipart/form-data">
    <div class="mb-3">
      <label class="form-label">Título</label>
      <input type="text" name="titulo" class="form-control" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Descripción</label>
      <textarea name="descripcion" rows="4" class="form-control" required></textarea>
    </div>
    <div class="mb-3">
      <label class="form-label">Categoría</label>
      <select name="categoria_id" class="form-select">
        <option value="">— Seleccionar —</option>
        {% for cat in categorias %}
        <option value="{{ cat.id }}">{{ cat.nombre }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="mb-3">
      <label class="form-label">Prioridad</label>
      <select name="prioridad" class="form-select">
        <option value="baja">Baja</option>
        <option value="media" selected>Media</option>
        <option value="alta">Alta</option>
      </select>
    </div>
    <div class="mb-3">
      <label class="form-label">Documento / Imagen (opcional)</label>
      <input type="file" name="archivo" class="form-control">
    </div>
    <button class="btn btn-helpdesk">Crear petición</button>
  </form>
</div>



{% endblock %}
